<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}HCL NetBox Discovery{% endblock %}</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <style>
    :root {
      --cu-orange: #F56600;
      --cu-purple: #522D80;
    }
    body { background: #f4f4f4; }
    .navbar-brand span.text-orange { color: var(--cu-orange); }
    .navbar { background-color: var(--cu-purple) !important; }
    .navbar-brand, .nav-link { color: #fff !important; }
    .nav-link:hover { color: var(--cu-orange) !important; }
    .badge-queued   { background-color: #6c757d; }
    .badge-running  { background-color: #0d6efd; }
    .badge-success  { background-color: #198754; }
    .badge-failed   { background-color: #dc3545; }
    .log-pre {
      background: #1e1e1e; color: #d4d4d4;
      padding: 1rem; border-radius: 4px;
      max-height: 60vh; overflow-y: auto;
      font-size: 0.8rem; white-space: pre-wrap;
    }
    .log-line-ERROR   { color: #f44336; }
    .log-line-WARNING { color: #ff9800; }
    .log-line-INFO    { color: #d4d4d4; }
    .log-line-DEBUG   { color: #9e9e9e; }
    .card-header-cu { background-color: var(--cu-purple); color: #fff; }
    a.text-cu-orange { color: var(--cu-orange); text-decoration: none; }
    a.text-cu-orange:hover { text-decoration: underline; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">
      <span class="text-orange">HCL</span> NetBox Discovery
    </a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="/">Dashboard</a>
      <a class="nav-link" href="/schedules">Scheduler</a>
      <a class="nav-link" href="/cache">Cache</a>
    </div>
  </div>
</nav>
<div class="container-fluid px-4">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmZa7OV4uh6kKqfKHp5nFGJjv8c"
        crossorigin="anonymous"></script>
{% block scripts %}{% endblock %}
</body>
</html>
