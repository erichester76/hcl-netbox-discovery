<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}HCL NetBox Discovery{% endblock %}</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <style>
    :root {
      --cu-orange: #F56600;
      --cu-purple: #522D80;
    }
    /* Light mode defaults */
    body { background: #f4f4f4; color: #333; }
    .card { background-color: #fff; color: #333; }
    .table { --bs-table-color: #333; }

    /* Dark mode overrides – class is applied to <html> so the early script can set it before body renders */
    html.dark-mode body { background: #121212; color: #e0e0e0; }
    html.dark-mode .card { background-color: #1e1e1e; color: #e0e0e0; border-color: #444; }
    html.dark-mode .card-body { background-color: #1e1e1e; }
    html.dark-mode .table { --bs-table-color: #e0e0e0; --bs-table-bg: #1e1e1e; --bs-table-border-color: #444; }
    html.dark-mode .table-striped > tbody > tr:nth-of-type(odd) > * { --bs-table-accent-bg: #2a2a2a; }
    html.dark-mode .table-hover > tbody > tr:hover > * { --bs-table-accent-bg: #2f2f2f; color: #e0e0e0; }
    /* Fix bright-gray table-light headers in dark mode */
    html.dark-mode .table-light,
    html.dark-mode thead.table-light { --bs-table-color: #e0e0e0; --bs-table-bg: #2a2a2a; --bs-table-border-color: #444; color: #e0e0e0; background-color: #2a2a2a; }
    html.dark-mode thead.table-light > tr > th,
    html.dark-mode thead.table-light > tr > td { color: #e0e0e0; background-color: #2a2a2a; border-color: #444; }
    /* DB-override row highlight – light mode */
    tr.table-cu-override > td,
    tr.table-cu-override > th { background-color: #fff0e6; color: #333; border-color: #f5c6a0; }
    /* DB-override row highlight – dark mode */
    html.dark-mode tr.table-cu-override > td,
    html.dark-mode tr.table-cu-override > th { background-color: #2e1a08; color: #e0e0e0; border-color: #6b3a12; }
    /* DB-override badge */
    .badge-cu-override { background-color: var(--cu-orange); color: #fff; }
    /* Fix outline button text visibility in dark mode */
    html.dark-mode .btn-outline-secondary { color: #bbb; border-color: #bbb; }
    html.dark-mode .btn-outline-secondary:hover { color: #fff; background-color: #6c757d; border-color: #6c757d; }
    html.dark-mode .btn-outline-primary { color: #7aadff; border-color: #7aadff; }
    html.dark-mode .btn-outline-primary:hover { color: #fff; background-color: #0d6efd; border-color: #0d6efd; }
    html.dark-mode .btn-outline-warning { color: #ffc107; border-color: #ffc107; }
    html.dark-mode .btn-outline-warning:hover { color: #000; background-color: #ffc107; border-color: #ffc107; }
    html.dark-mode .btn-outline-danger { color: #f77; border-color: #f77; }
    html.dark-mode .btn-outline-danger:hover { color: #fff; background-color: #dc3545; border-color: #dc3545; }
    html.dark-mode .btn-outline-success { color: #75c97c; border-color: #75c97c; }
    html.dark-mode .btn-outline-success:hover { color: #fff; background-color: #198754; border-color: #198754; }
    html.dark-mode .modal-content { background-color: #1e1e1e; color: #e0e0e0; }
    html.dark-mode .form-control,
    html.dark-mode .form-select { background-color: #2a2a2a; color: #e0e0e0; border-color: #555; }
    html.dark-mode .form-control:focus,
    html.dark-mode .form-select:focus { background-color: #2a2a2a; color: #e0e0e0; border-color: var(--cu-orange); box-shadow: 0 0 0 0.2rem rgba(245,102,0,.25); }
    html.dark-mode .input-group-text { background-color: #333; color: #e0e0e0; border-color: #555; }
    html.dark-mode .list-group-item { background-color: #1e1e1e; color: #e0e0e0; border-color: #444; }
    html.dark-mode .dropdown-menu { background-color: #1e1e1e; border-color: #444; }
    html.dark-mode .dropdown-item { color: #e0e0e0; }
    html.dark-mode .dropdown-item:hover { background-color: #2a2a2a; }
    html.dark-mode .badge.bg-secondary { background-color: #555 !important; }
    html.dark-mode hr { border-color: #444; }

    .navbar-brand span.text-orange { color: var(--cu-orange); }
    .navbar { background-color: var(--cu-purple) !important; }
    .navbar-brand, .nav-link { color: #fff !important; }
    .nav-link:hover { color: var(--cu-orange) !important; }
    .navbar-version {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }
    .badge-queued   { background-color: #6c757d; }
    .badge-running  { background-color: #0d6efd; }
    .badge-success  { background-color: #198754; }
    .badge-partial  { background-color: #fd7e14; }
    .badge-failed   { background-color: #dc3545; }
    .badge-stopped  { background-color: #6f42c1; }
    .log-pre {
      background: #1e1e1e; color: #d4d4d4;
      padding: 1rem; border-radius: 4px;
      max-height: 60vh; overflow-y: auto;
      font-size: 0.8rem; white-space: pre-wrap;
    }
    .log-line-ERROR   { color: #f44336; }
    .log-line-WARNING { color: #ff9800; }
    .log-line-INFO    { color: #d4d4d4; }
    .log-line-DEBUG   { color: #9e9e9e; }
    .card-header-cu { background-color: var(--cu-purple); color: #fff; }
    a.text-cu-orange { color: var(--cu-orange); text-decoration: none; }
    a.text-cu-orange:hover { text-decoration: underline; }

    /* Dark mode toggle button */
    #dark-mode-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.25rem;
      line-height: 1;
      padding: 0.25rem 0.5rem;
      color: #fff;
    }
    #dark-mode-toggle:hover { color: var(--cu-orange); }
  </style>
  <!-- Apply saved dark mode preference before page renders to avoid flash -- 2026-03-31 -->
  <script>
    (function () {
      if (localStorage.getItem('darkMode') === 'enabled') {
        document.documentElement.classList.add('dark-mode');
      }
    })();
  </script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
  <div class="container-fluid">
    <div class="d-flex align-items-center gap-2">
      <a class="navbar-brand fw-bold mb-0" href="/">
        <span class="text-orange">HCL</span> NetBox Discovery
      </a>
      <span class="navbar-version" title="Version {{ web_version_label }}">Version {{ web_version_label }}</span>
    </div>
    <div class="navbar-nav ms-auto d-flex align-items-center">
      {% if not web_auth_enabled or web_authenticated %}
      <a class="nav-link" href="/">Dashboard</a>
      <a class="nav-link" href="/schedules">Scheduler</a>
      <a class="nav-link" href="/cache">Cache</a>
      <a class="nav-link" href="/settings">Settings</a>
      {% endif %}
      {% if web_auth_enabled and web_authenticated %}
      <span class="navbar-text text-white-50 small me-2">{{ web_username }}</span>
      <form method="POST" action="/logout" class="ms-2">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <button type="submit" class="btn btn-sm btn-outline-light">Log Out</button>
      </form>
      {% endif %}
      <!-- Dark mode toggle icon -- 2026-03-31 -->
      <button id="dark-mode-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">
        <span id="dark-mode-icon">🌙</span>
      </button>
    </div>
  </div>
</nav>
<div class="container-fluid px-4">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmZa7OV4uh6kKqfKHp5nFGJjv8c"
        crossorigin="anonymous"></script>
<script>
  // Dark mode toggle logic -- 2026-03-31
  (function () {
    var html = document.documentElement;
    var icon = document.getElementById('dark-mode-icon');
    var btn  = document.getElementById('dark-mode-toggle');

    function applyDarkMode(enabled) {
      if (enabled) {
        html.classList.add('dark-mode');
        icon.textContent = '☀️';
        btn.title = 'Switch to light mode';
        btn.setAttribute('aria-label', 'Switch to light mode');
      } else {
        html.classList.remove('dark-mode');
        icon.textContent = '🌙';
        btn.title = 'Switch to dark mode';
        btn.setAttribute('aria-label', 'Switch to dark mode');
      }
    }

    // Initialize from saved preference
    var savedPref = localStorage.getItem('darkMode');
    applyDarkMode(savedPref === 'enabled');

    btn.addEventListener('click', function () {
      var isDark = html.classList.contains('dark-mode');
      localStorage.setItem('darkMode', isDark ? 'disabled' : 'enabled');
      applyDarkMode(!isDark);
    });
  })();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
