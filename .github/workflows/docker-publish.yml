# File: .github/workflows/docker-publish.yml
# Purpose: Run tests on branch pushes/PRs, then build and push Docker images to
# GitHub Container Registry (ghcr.io) for dev/main/tag pushes.
# Created: 2026-04-01
# Last Changed: GitHub Copilot Issue: #add-test-suite-run-to-pipeline

name: Build and Push Docker Image

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run test suite
        run: poetry run pytest

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: >-
      github.event_name == 'push' && (
        github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/tags/v') ||
        (
          github.ref == 'refs/heads/dev' &&
          !contains(github.event.head_commit.message, '/docs/') &&
          !contains(github.event.head_commit.message, '/chore/') &&
          !startsWith(github.event.head_commit.message, 'docs:') &&
          !startsWith(github.event.head_commit.message, 'chore:')
        )
      )

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read project version
        id: project_version
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(f"version={data['tool']['poetry']['version']}")
          PY

      - name: Verify release tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          expected_tag="v${{ steps.project_version.outputs.version }}"
          actual_tag="${GITHUB_REF_NAME}"
          if [ "$actual_tag" != "$expected_tag" ]; then
            echo "Actual tag ${actual_tag} does not match expected tag ${expected_tag} derived from pyproject.toml version" >&2
            exit 1
          fi

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Read project version
        id: project_version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(f"version={data['tool']['poetry']['version']}")
          PY

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PYTHON_VER=3.12
            APP_VERSION=${{ steps.project_version.outputs.version }}
            APP_GIT_COMMIT=${{ github.sha }}
            APP_GIT_BRANCH=${{ github.ref_type == 'branch' && github.ref_name || '' }}
            APP_GIT_TAG=${{ github.ref_type == 'tag' && github.ref_name || '' }}
